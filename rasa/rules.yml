version: "3.1"

rules:
  - rule: Say goodbye anytime the user says goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Say hello anytime the user greets
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Handle fallback
    steps:
      - intent: nlu_fallback
      - action: action_default_fallback
